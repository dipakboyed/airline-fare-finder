name: fares-daily

on:
  schedule:
    # 15:00 UTC = 08:00 America/Los_Angeles (PDT). Adjust as desired.
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without persisting or emailing"
        type: boolean
        default: false

permissions:
  contents: write   # commit fare history back to the repo

concurrency:
  group: fares-daily
  cancel-in-progress: false

jobs:
  fares:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can rebase before pushing

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .

      - name: Run fare search
        id: fares
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TRAVELPAYOUTS_MARKER: ${{ secrets.TRAVELPAYOUTS_MARKER }}
        run: |
          python -m farefinder run \
            --config-dir config/searches \
            --data-dir data \
            --report-out report.html \
            --text-out report.txt \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Commit fare history
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "no fare-history changes"
            exit 0
          fi
          git commit -m "chore: update fare history [skip ci]"
          # Rebase our data commit onto the latest main and retry, so concurrent
          # changes (other commits, overlapping runs) don't cause a lost push.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "pushed fare history (attempt $attempt)"
              exit 0
            fi
            echo "push rejected on attempt $attempt; rebasing onto origin/main"
            git pull --rebase --autostash origin main || {
              echo "::error::rebase failed (unexpected conflict in data/)"; exit 1;
            }
            sleep $((attempt * 3))
          done
          echo "::error::could not push fare history after 5 attempts"
          exit 1

      - name: Load report into env
        if: ${{ steps.fares.outputs.should_email == 'true' }}
        run: |
          DELIM="REPORT_EOF_$(openssl rand -hex 12)"
          {
            echo "REPORT_HTML<<$DELIM"
            cat report.html
            echo "$DELIM"
          } >> "$GITHUB_ENV"

      - name: Email fare update
        if: ${{ steps.fares.outputs.should_email == 'true' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: airline-fare-finder <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.fares.outputs.subject }}
          html_body: ${{ env.REPORT_HTML }}
