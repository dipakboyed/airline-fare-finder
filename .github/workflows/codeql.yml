name: codeql

# Code scanning upload (Security tab) needs GitHub Advanced Security, which is
# not available on this private repo. So we run CodeQL and inspect the SARIF for
# findings directly (`upload: never`) — the job fails if any issue is found.
# If this repo is made public or GHAS is enabled, switch `upload` to `always`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 17 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: never
          output: codeql-results

      - name: Fail on any finding
        run: |
          shopt -s nullglob
          files=(codeql-results/*.sarif)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no SARIF produced for ${{ matrix.language }}"; exit 0
          fi
          count=$(jq -s '[.[].runs[].results[]?] | length' "${files[@]}")
          echo "CodeQL findings (${{ matrix.language }}): $count"
          if [ "$count" -ne 0 ]; then
            jq -s '[.[].runs[].results[]? | {rule: .ruleId, msg: .message.text}]' "${files[@]}"
            echo "::error::CodeQL found $count issue(s) for ${{ matrix.language }}"
            exit 1
          fi

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: codeql-results
          if-no-files-found: ignore
