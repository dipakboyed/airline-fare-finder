# SEA -> LIH, November 2026, 4-6 day trip, best fare per cabin.
name: sea-lih
origin: SEA
destination: LIH
max_stops: 0

# Departure window. Relative tokens: "today", "+Nd". Or an ISO date (YYYY-MM-DD).
depart_window:
  from: 2026-11-21
  to: 2026-11-26

# Inclusive [min, max] total trip length in days.
trip_length_days: [4, 6]

cabins: [ECONOMY, PREMIUM_ECONOMY, BUSINESS]

preferred_airlines: []

passengers: 4
currency: USD

# Fares at or below this (USD) are flagged as deals.
target_price_usd: 500

# When to email: only_drops | every_run | only_target | every_run_plus_drops
alert_policy: every_run_plus_drops

# Coarse-first sampling to keep the search cheap; tune reactively.
sampling:
  depart_step_days: 1
  trip_length_step_days: 2

# Max cross-check (Travelpayouts) confirmations per run.
crosscheck_max_calls_per_run: 15
